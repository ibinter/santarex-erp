version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: santarex_postgres
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME:-santarex_db}
      POSTGRES_USER: ${DB_USER:-santarex}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - santarex_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U santarex -d santarex_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: santarex_redis
    restart: always
    networks:
      - santarex_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: santarex_backend
    restart: always
    env_file: .env.prod
    ports:
      - "3002:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - santarex_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://santarex.ibigsoft.com/api/v1
    container_name: santarex_frontend
    restart: always
    env_file: .env.prod
    ports:
      - "3003:3000"
    depends_on:
      - backend
    networks:
      - santarex_net

volumes:
  postgres_data:

networks:
  santarex_net:
    driver: bridge
