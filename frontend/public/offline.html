<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — SANTAREX ERP</title>
  <link rel="icon" href="/favicon-32-tr.png" type="image/png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #F5F7FA 0%, #E3ECF7 100%);
      color: #1A2332;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(13, 71, 161, 0.12);
      max-width: 420px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      display: block;
    }
    .icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #EFF6FF;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #0D47A1; }
    p { font-size: 14px; line-height: 1.6; color: #546E7A; margin-bottom: 8px; }
    .hint { font-size: 12px; color: #90A4AE; margin-top: 16px; }
    button {
      margin-top: 24px;
      background: #0D47A1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover { background: #0B3C8A; }
    .brand { margin-top: 28px; font-size: 11px; letter-spacing: 0.5px; color: #B0BEC5; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo-icon-tr.png" alt="SANTAREX" class="logo" onerror="this.style.display='none'" />
    <div class="icon-wrap" aria-hidden="true">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#0D47A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>Vous êtes hors ligne</h1>
    <p>Impossible de joindre les serveurs SANTAREX pour le moment.</p>
    <p>Vérifiez votre connexion internet, puis réessayez.</p>
    <button onclick="location.reload()">Réessayer</button>
    <p class="hint">Les pages déjà consultées restent accessibles hors connexion.</p>
    <div class="brand">SANTAREX ERP — IBIG SOFT</div>
  </div>
  <script>
    // Auto-reload as soon as connectivity returns
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
